    <script>

        //Selected
        document.addEventListener('DOMContentLoaded', function () {
            const dropdownLabel = document.querySelector('.drsl');
            const searchInput = document.querySelector('.drsar');
            const dropdownMenu = document.querySelector('.drmen');
            const options = document.querySelectorAll('.sele');
            const selectedCurrency = document.querySelector('.drsl span');

            dropdownLabel.addEventListener('click', function () {
                dropdownMenu.classList.toggle('active');
                if (dropdownMenu.classList.contains('active')) {
                    searchInput.focus();
                    searchInput.value = '';
                    filterOptions('');
                }
            });

            searchInput.addEventListener('input', function () {
                filterOptions(searchInput.value.toLowerCase());
            });

            options.forEach(option => {
                option.addEventListener('click', function () {
                    const selectedValue = this.getAttribute('data-value');
                    dropdownLabel.textContent = selectedValue;
                    dropdownMenu.classList.remove('active');
                    selectedCurrency.textContent = selectedValue;
                });
            });

            function filterOptions(searchText) {
                options.forEach(option => {
                    const optionText = option.textContent.toLowerCase();
                    if (optionText.includes(searchText)) {
                        option.style.display = 'block';
                    } else {
                        option.style.display = 'none';
                    }
                });
            }


        });

        //Bank None Block
        document.addEventListener('DOMContentLoaded', function () {
            const options = document.querySelectorAll('.sele');
            const bankDiv = document.querySelector('.bank');
            const btcDiv = document.querySelector('.btc');
            const densDiv = document.querySelector('.dens');

            options.forEach(option => {
                option.addEventListener('click', function () {
                    const selectedValue = this.getAttribute('data-value');
                    switch (selectedValue) {
                        case 'BANK':
                            bankDiv.classList.add('open');
                            btcDiv.classList.remove('open');
                            densDiv.classList.add('none')
                            break;
                        case 'IBAN':
                            bankDiv.classList.remove('open');
                            btcDiv.classList.remove('open');
                            densDiv.classList.add('none')
                            break;
                        case 'BTC':
                            btcDiv.classList.add('open');
                            bankDiv.classList.remove('open');
                            densDiv.classList.add('none')
                            break;
                        default:
                            break;
                    }
                });
            });
        });

        //Yatirim
        document.addEventListener("DOMContentLoaded", function () {
            
            var yatirimLink = document.getElementById("yatirims");
            var digerLinkler = document.querySelectorAll(".menu-tog a:not(#yatirims)");

            yatirimLink.addEventListener("click", function (e) {
                e.preventDefault();
                var yatirimPopup = document.querySelector(".yatirim-popup");
                yatirimPopup.classList.add("popups");

                digerLinkler.forEach(function (link) {
                    link.classList.remove("popups");
                });
            });

            // Diğer linklerin click olaylarını dinle
            digerLinkler.forEach(function (link) {
                link.addEventListener("click", function (e) {
                    e.preventDefault();
                    document.querySelector(".yatirim-popup").classList.remove("popups");
                });
            });
        });


        //Hacim
    document.addEventListener("DOMContentLoaded", function() {
        var plusButton = document.querySelector(".fa-plus");
        var minusButton = document.querySelector(".fa-minus");
        var spanElement = document.querySelector(".sell-hac span");

        plusButton.addEventListener("click", function(e) {
            e.preventDefault();
            var currentValue = parseInt(spanElement.textContent);
            spanElement.textContent = currentValue + 1;
        });

        minusButton.addEventListener("click", function(e) {
            e.preventDefault();
            var currentValue = parseInt(spanElement.textContent);
            if (currentValue > 0) {
                spanElement.textContent = currentValue - 1;
            }
        });
    });

    </script>
